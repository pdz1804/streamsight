name: CI

# The GPU is the interesting path but it is not the reproducible one: hosted
# runners have no NVIDIA device and no model weights. CI therefore proves the
# portable half -- that the code imports, lints, type-checks, builds, and that
# every test which does not require an inference artifact passes on a bare
# machine. The model-backed tier is marked `slow` and is deselected here; it is
# run locally where weights exist.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (python 3.11, cpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # opencv-python links against libGL and glib; the slim runner image has
      # neither, and `import cv2` fails at collection time without them. The
      # package was renamed on Ubuntu 24.04, hence the fallback.
      - name: System libraries for OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0t64 \
            || sudo apt-get install -y libgl1 libglib2.0-0

      # torch first, from the CPU index. requirements.txt does not pin torch
      # precisely because the wheel differs per target; locally it is cu121,
      # here it is CPU, which keeps the download ~200 MB instead of ~2.5 GB.
      - name: Install torch (CPU wheels)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.3.1 torchvision==0.18.1 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check apps/api ml

      - name: Black
        run: black --check apps/api ml

      # -m "not slow" drops apps/api/tests/test_api.py, the only module that
      # boots the real runtime. The remaining tests are pure logic plus fixtures
      # that skip themselves when no artifact is present.
      # No path argument: a positional path overrides `testpaths` in pyproject.toml,
      # which would silently drop ml/eval -- and that is where the 14 guards against
      # the silent-zero-mAP conversions live. Those are exactly the tests CI must run.
      - name: Pytest (fast tier)
        run: pytest -q -m "not slow"

      # NFR-8's "CI smoke test on COCO8" gap. The unit tests above only prove
      # the conversion functions are correct in isolation; this proves they are
      # correct *wired together* -- dataset load, real CPU inference, box and
      # category-id conversion, pycocotools scoring -- which is exactly where a
      # COCO harness silently reports zero. See ml/eval/smoke_coco8.py's module
      # docstring for why the bound is loose and why a broken box conversion
      # still fails it (verified locally: swapping width/height drove mAP75
      # from 0.73 to 0.00).
      - name: Cache COCO8 smoke-test assets
        uses: actions/cache@v4
        with:
          path: |
            ml/data/raw/coco8
            ml/models/weights/yolo11n.pt
          # Keyed on the pinned asset releases in smoke_coco8.py, not the file
          # hash, so touching an unrelated part of the script does not bust a
          # cache that is still valid.
          key: coco8-smoke-assets-coco8-v0.0.0-yolo11n-v8.4.0

      - name: COCO8 smoke test (NFR-8)
        env:
          # Defence in depth: fp32_cpu is hardcoded in smoke_coco8.py and never
          # touches a GPU regardless, but hosted runners have none anyway.
          CUDA_VISIBLE_DEVICES: ""
        run: python ml/eval/smoke_coco8.py

  web:
    name: web (node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # The build only needs the API base URL to bake a string into the bundle;
      # it never calls the API, so no service has to be running.
      - name: Build
        run: npm run build
